name: CI

on:
  push:
    branches:
      - main      
  pull_request:   

jobs:
  build-and-test:
    runs-on: windows-2022

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.0'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        env:
          PYTHONPATH: ./src   # чтобы тесты видели модуль src
        run: |
          pytest tests -v